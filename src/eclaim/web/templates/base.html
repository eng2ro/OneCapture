<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OneCapture e-Claim{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">OneCapture <span>e-Claim</span></a>
    <nav>
      <a href="/capture">Capture</a>
      <a href="/claims">Claims</a>
      <a href="/ledger">Ledger</a>
      {% if is_firm_scoped %}<a href="/admin/categories">Admin</a>{% endif %}
      <form method="post" action="/logout" class="signout"><button type="submit">Sign out</button></form>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
