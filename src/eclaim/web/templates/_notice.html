{% extends "base.html" %}
{% block title %}{{ heading or "Notice" }} · OneCapture e-Claim{% endblock %}
{% block topbar_sub %}{{ topbar or "Notice" }}{% endblock %}
{% block content %}
{% include "_editorial.html" %}
<div class="capx">
  <div class="card" style="max-width:560px;margin:48px auto;text-align:center;">
    <div style="width:52px;height:52px;border-radius:12px;background:var(--rust-tint);color:var(--rust);display:grid;place-items:center;margin:0 auto 16px;font-size:26px;">
      <i class="ti {{ icon or 'ti-help-circle' }}"></i>
    </div>
    <h1 class="page-title" style="font-size:20px;">{{ heading or "Not found" }}</h1>
    <p class="page-sub" style="margin-top:10px;">{{ detail or "" }}</p>
    <div style="margin-top:20px;">
      <a class="btn btn-accent" href="/claims"><i class="ti ti-arrow-left"></i>Back to claims</a>
    </div>
  </div>
</div>
{% endblock %}
