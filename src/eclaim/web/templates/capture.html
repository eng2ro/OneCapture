{% extends "base.html" %}
{% block title %}Capture — OneCapture e-Claim{% endblock %}
{% block content %}
<section class="card">
  <h1>Capture a receipt</h1>
  <p class="muted">Upload a receipt image. It will be read, carbon-classified, and routed to review.</p>
  <form id="upload-form">
    <label class="drop" for="file">
      <input type="file" id="file" name="file" accept="image/png,image/jpeg,image/webp" required>
      <span>Drag &amp; drop or choose a receipt image</span>
    </label>
    <button type="submit">Upload &amp; classify</button>
    <p id="status" class="status"></p>
  </form>
</section>
<script>
  const form = document.getElementById('upload-form');
  const statusEl = document.getElementById('status');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusEl.textContent = 'Reading receipt…';
    const data = new FormData();
    data.append('file', document.getElementById('file').files[0]);
    const res = await fetch('/api/claims/upload', { method: 'POST', body: data });
    if (!res.ok) {
      const err = await res.json().catch(() => ({detail: res.statusText}));
      statusEl.textContent = 'Error: ' + (err.detail || res.status);
      return;
    }
    const claim = await res.json();
    window.location.href = '/claims/' + claim.id + '/review';
  });
</script>
{% endblock %}
