<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — OneCapture e-Claim</title>
  <link rel="stylesheet" href="/static/style.css?v=20260629e">
</head>
<body style="background:var(--page-bg);">
<div style="max-width:860px;margin:6vh auto;padding:0 20px;">
<div class="screen active" id="screen-login">
  <div style="display:flex;align-items:stretch;min-height:520px;border-radius:18px;overflow:hidden;border:1px solid var(--border);">
    <div style="flex:1;padding:40px 36px;background:var(--dark);color:white;display:flex;flex-direction:column;justify-content:space-between;">
      <div>
        <div style="margin-bottom:36px;">
          <div style="font-size:24px;font-weight:700;letter-spacing:-0.025em;line-height:1;">One<span style="color:#5ce1e6;">Capture</span></div>
          <div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.08em;font-weight:600;margin-top:4px;">E-CLAIM</div>
        </div>
        <div style="font-size:30px;font-weight:600;line-height:1.25;margin-bottom:14px;">e-Claim.<br/>One workflow.</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;max-width:340px;">Capture employee expenses. Feed carbon scope 1 and 3 automatically.</div>
      </div>
      <div>
        <div style="display:flex;align-items:center;gap:8px;color:var(--light-green);font-size:12px;margin-bottom:6px;"><i class="ti ti-leaf"></i>Part of the Carbon Next family</div>
      </div>
    </div>

    <div style="flex:1;padding:48px 40px;background:var(--white);display:flex;flex-direction:column;justify-content:center;">
      <div style="font-size:22px;font-weight:600;margin-bottom:6px;">Sign in to e-Claim</div>
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:26px;">Use your firm account to continue</div>

      {% if error %}<div class="error" style="margin-bottom:16px;">{{ error }}</div>{% endif %}

      <form method="post" action="/login">
        <label class="label-tiny">Work email</label>
        <input class="field" name="email" type="email" autocomplete="username" placeholder="you@firm.com.my" style="margin-bottom:14px;" required />

        <label class="label-tiny">Password</label>
        <input class="field" name="password" type="password" autocomplete="current-password" placeholder="••••••••" style="margin-bottom:18px;" required />

        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:11px;font-size:14px;">Sign in</button>
      </form>

      <div style="margin-top:24px;font-size:10px;color:var(--text-tertiary);text-align:center;">Need help? Contact your firm administrator</div>
    </div>
  </div>
</div>
</div>
</body>
</html>
