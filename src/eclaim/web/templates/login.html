{% extends "base.html" %}
{% block title %}Sign in — OneCapture e-Claim{% endblock %}
{% block content %}
<section class="card" style="max-width: 420px; margin: 40px auto;">
  <h1>Sign in</h1>
  <p class="muted">Sign in with your firm email to reach the claims inbox.</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form class="fields" method="post" action="/login">
    <label>Email <input name="email" type="email" autocomplete="username" required></label>
    <label>Password <input name="password" type="password" autocomplete="current-password"></label>
    <button type="submit" class="primary">Sign in</button>
  </form>
</section>
{% endblock %}
